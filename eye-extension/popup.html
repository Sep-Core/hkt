<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Shrimp Debug Tool</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 12px;
        width: 320px;
      }
      .row {
        margin-bottom: 10px;
      }
      label {
        display: block;
        font-size: 12px;
        margin-bottom: 4px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
      }
      code {
        background: #f3f3f3;
        padding: 2px 4px;
        border-radius: 4px;
      }
      button {
        width: 100%;
        padding: 8px;
        border: 0;
        border-radius: 6px;
        background: #d32f2f;
        color: #fff;
        cursor: pointer;
      }
      .hint {
        font-size: 12px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="row">
      <label for="api-url">Coordinate API URL</label>
      <input id="api-url" type="text" placeholder="http://127.0.0.1:3000/coordinate" />
    </div>
    <div class="row">
      <label for="basis">Coordinate Basis</label>
      <select id="basis">
        <option value="auto">auto (viewport first)</option>
        <option value="viewport">viewport</option>
        <option value="document">document</option>
      </select>
    </div>
    <div class="row">
      <label for="poll-ms">Poll Interval (ms)</label>
      <input id="poll-ms" type="number" min="30" step="10" />
    </div>
    <div class="row">
      <label for="radius">Spotlight Radius (px)</label>
      <input id="radius" type="number" min="60" step="10" />
    </div>
    <div class="row">
      <label><input id="show-debug-box" type="checkbox" /> Show red debug box</label>
    </div>
    <button id="save-btn">Save</button>
    <div class="row" style="display:flex;gap:8px;margin-top:8px">
      <button id="calibrate-btn" style="background:#1976d2">Start Calibration</button>
      <button id="reset-calibration-btn" style="background:#616161">Reset Calibration</button>
    </div>
    <p class="hint">
      Compatible input formats: <code>{"x":320,"y":240}</code>,
      <code>{"coordinate":{"x":320,"y":240}}</code>, <code>[320,240]</code>, <code>320,240</code>.
    </p>
    <p class="hint" id="status">Not saved yet</p>
    <script src="popup.js"></script>
  </body>
</html>
